name: research_digest
mode: prod
steps:
  - id: fetch_arxiv
    kind: tool
    ref: agents.research_digest.src.steps:fetch_arxiv
    outputs: ["docs_arxiv"]
    config:
      query: "cat:cs.AI"
      categories: ["cs.AI", "cs.CL"]
      max_docs: 25
      feed_url: "https://export.arxiv.org/api/query"

  - id: fetch_rss
    kind: tool
    ref: agents.research_digest.src.steps:fetch_rss
    outputs: ["docs_rss"]
    config:
      feed_urls:
        - "https://lilianweng.github.io/index.xml"
        - "https://huggingface.co/blog/feed.xml"
      max_docs: 25

  - id: normalize
    kind: tool
    ref: agents.research_digest.src.steps:normalize
    inputs: ["docs_arxiv", "docs_rss"]
    outputs: ["docs_normalized"]
    config:
      max_docs: 40

  - id: dedupe_rank
    kind: tool
    ref: agents.research_digest.src.steps:dedupe_rank
    inputs: ["docs_normalized"]
    outputs: ["docs_ranked"]
    config:
      keywords: ["agent", "reasoning", "evaluation", "benchmark", "retrieval"]
      top_k: 20

  - id: synthesize
    kind: tool
    ref: agents.research_digest.src.steps:synthesize_digest
    inputs: ["docs_ranked"]
    outputs: ["digest_json"]
    config:
      provider: "openai"
      model: "gpt-4o-mini"
      top_k: 10
      temperature: 0.2
      max_output_tokens: 2000

  - id: render
    kind: tool
    ref: agents.research_digest.src.steps:render
    inputs: ["digest_json"]
    outputs: ["digest_md"]
    config:
      output_filenames:
        json: "digest.json"
        markdown: "digest.md"
