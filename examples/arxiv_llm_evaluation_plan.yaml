plan_id: arxiv-llm-evaluation-v1
max_parallel: 2
policy_snapshot: {}
trigger:
  kind: manual
  source: cli
nodes:
  - node_id: fetch_and_snapshot
    agent_id: arxiv.research
    operation: fetch_and_snapshot
    outputs: [raw_feed_xml, papers_raw]
    metadata:
      config:
        mode: live
        query: >
          ("llm evaluation" OR "agent evaluation" OR benchmark OR "single-turn" OR "multi-turn" OR "judge model")
          AND (reliability OR robustness OR safety OR cybersecurity OR "red team" OR microsoft)
        categories: [cs.AI, cs.CL, cs.CR, cs.SE]
        max_results: 40
        sort_by: relevance
        ranking:
          factors: [topic_alignment, methodological_rigor, reproducibility, citations, credibility, recency]
          weights:
            topic_alignment: 0.3
            methodological_rigor: 0.2
            reproducibility: 0.15
            citations: 0.15
            credibility: 0.1
            recency: 0.1

  - node_id: synthesize_digest
    agent_id: arxiv.research
    operation: synthesize_digest
    inputs: [papers_raw]
    outputs: [digest_json]
    depends_on: [fetch_and_snapshot]
    metadata:
      config:
        mode: replay

  - node_id: render_report
    agent_id: arxiv.research
    operation: render_report
    inputs: [digest_json]
    outputs: [report_md, sources_json]
    depends_on: [synthesize_digest]

  - node_id: local_write_delivery
    agent_id: arxiv.research
    operation: local_write_delivery
    inputs: [report_md]
    outputs: [delivery_path]
    depends_on: [render_report]
    metadata:
      optional: true
