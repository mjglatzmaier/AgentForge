plan_id: arxiv-llm-theory-v1
max_parallel: 2
policy_snapshot: {}
trigger:
  kind: manual
  source: cli
nodes:
  - node_id: fetch_and_snapshot
    agent_id: arxiv.research
    operation: fetch_and_snapshot
    outputs: [raw_feed_xml, papers_raw]
    metadata:
      config:
        mode: live
        query: >
          ("large language model" OR LLM OR transformer) AND
          ("scaling laws" OR scaling OR finetuning OR "parameter-efficient tuning" OR trend OR benchmark OR physics)
        categories: [cs.CL, cs.LG, cs.AI, stat.ML]
        max_results: 40
        sort_by: relevance
        ranking:
          factors: [topic_alignment, citations, credibility, engagement, recency, methodological_rigor]
          weights:
            topic_alignment: 0.35
            citations: 0.2
            credibility: 0.15
            engagement: 0.1
            recency: 0.1
            methodological_rigor: 0.1

  - node_id: synthesize_digest
    agent_id: arxiv.research
    operation: synthesize_digest
    inputs: [papers_raw]
    outputs: [digest_json]
    depends_on: [fetch_and_snapshot]
    metadata:
      config:
        mode: replay

  - node_id: render_report
    agent_id: arxiv.research
    operation: render_report
    inputs: [digest_json]
    outputs: [report_md, sources_json]
    depends_on: [synthesize_digest]

  - node_id: local_write_delivery
    agent_id: arxiv.research
    operation: local_write_delivery
    inputs: [report_md]
    outputs: [delivery_path]
    depends_on: [render_report]
    metadata:
      optional: true
